<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entertainment Form</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
 
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: Georgia, serif;
      padding: 20px;
    }
 
    .card {
      background: #16213e;
      padding: 40px;
      border-radius: 14px;
      box-shadow: 0 4px 30px rgba(0,0,0,0.4);
      width: 380px;
      color: #eee;
    }
 
    h2 {
      text-align: center;
      margin-bottom: 6px;
      font-size: 26px;
      color: #f5a623;
    }
 
    p.subtitle {
      text-align: center;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 28px;
    }
 
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #ccc;
    }
 
    input, select {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #333;
      border-radius: 8px;
      font-size: 15px;
      margin-bottom: 18px;
      background: #0f3460;
      color: #fff;
      outline: none;
      transition: border 0.2s;
    }
 
    input:focus, select:focus {
      border-color: #f5a623;
    }
 
    .genre-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }
 
    .genre-group input[type="checkbox"] {
      display: none;
      width: auto;
      margin: 0;
    }
 
    .genre-group label {
      padding: 7px 14px;
      background: #0f3460;
      border: 1.5px solid #333;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      color: #ccc;
      transition: all 0.2s;
      margin: 0;
    }
 
    .genre-group input[type="checkbox"]:checked + label {
      background: #f5a623;
      border-color: #f5a623;
      color: #1a1a2e;
      font-weight: bold;
    }
 
    button {
      width: 100%;
      padding: 12px;
      background: #f5a623;
      color: #1a1a2e;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
 
    button:hover {
      background: #e09415;
    }
 
    .msg {
      text-align: center;
      margin-top: 14px;
      font-size: 14px;
      color: #f5a623;
      display: none;
    }
  </style>
</head>
<body>
 
  <div class="card">
    <h2>🎬 Entertainment</h2>
    <p class="subtitle">Tell us what you love to watch</p>
 
    <label for="name">Your Name</label>
    <input type="text" id="name" placeholder="e.g. Alex">
 
    <label for="age">Age Group</label>
    <select id="age">
      <option value="">-- Select --</option>
      <option>Under 18</option>
      <option>18 – 25</option>
      <option>26 – 35</option>
      <option>36 – 50</option>
      <option>50+</option>
    </select>
 
    <label>Favorite Genres</label>
    <div class="genre-group">
      <input type="checkbox" id="action"> <label for="action">Action</label>
      <input type="checkbox" id="comedy"> <label for="comedy">Comedy</label>
      <input type="checkbox" id="drama"> <label for="drama">Drama</label>
      <input type="checkbox" id="horror"> <label for="horror">Horror</label>
      <input type="checkbox" id="scifi"> <label for="scifi">Sci-Fi</label>
      <input type="checkbox" id="romance"> <label for="romance">Romance</label>
      <input type="checkbox" id="anime"> <label for="anime">Anime</label>
      <input type="checkbox" id="docs"> <label for="docs">Docs</label>
    </div>
 
    <label for="platform">Preferred Platform</label>
    <select id="platform">
      <option value="">-- Select --</option>
      <option>Netflix</option>
      <option>YouTube</option>
      <option>Disney+</option>
      <option>Prime Video</option>
      <option>Other</option>
    </select>
 
    <button onclick="submit()">Submit Preferences</button>
    <p class="msg" id="msg"></p>
  </div>
 
  <script>
    function submit() {
      const name = document.getElementById("name").value.trim();
      const age = document.getElementById("age").value;
      const platform = document.getElementById("platform").value;
      const msg = document.getElementById("msg");
 
      const genres = ["action","comedy","drama","horror","scifi","romance","anime","docs"]
        .filter(id => document.getElementById(id).checked);
 
      if (!name || !age || !platform) {
        msg.style.color = "tomato";
        msg.style.display = "block";
        msg.textContent = "Please fill in all fields.";
        return;
      }
 
      if (genres.length === 0) {
        msg.style.color = "tomato";
        msg.style.display = "block";
        msg.textContent = "Please pick at least one genre.";
        return;
      }
 
      msg.style.color = "#f5a623";
      msg.style.display = "block";
      msg.textContent = `Thanks, ${name}! You love ${genres.join(", ")} on ${platform}. 🎉`;
    }
  </script>
 
</body>
</html>
